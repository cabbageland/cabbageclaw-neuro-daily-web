<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cabbageclaw neuro daily</title>
  <meta name="description" content="GitHub Pages dashboard for cabbageclaw neuro daily" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="neuro daily" />
  <meta name="theme-color" content="#12314d" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png" />
  <link rel="manifest" href="./site.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page-stamp" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-copy">
        <p class="eyebrow">cabbageland/cabbageclaw-neuro-daily</p>
        <h1 class="site-title"><span class="title-gradient">cabbageclaw neuro daily</span></h1>
      </div>
      <div class="topbar-actions">
        <a class="button ghost source-pill" href="https://github.com/cabbageland/cabbageclaw-neuro-daily" target="_blank" rel="noreferrer">source repo</a>
      </div>
    </header>

    <section class="hero" id="hero"></section>

    <nav class="tabs">
      <button class="tab active" data-view="overview">Overview</button>
      <button class="tab" data-view="digests">Digests</button>
      <button class="tab" data-view="notes">Paper notes</button>
      <button class="tab" data-view="related">Related work</button>
    </nav>

    <section class="controls">
      <input id="searchInput" type="search" placeholder="Search titles, themes, verdicts, mechanisms, or notes..." />
      <select id="verdictFilter">
        <option value="">All verdicts</option>
        <option>Directly relevant</option>
        <option>Highly relevant</option>
        <option>Useful</option>
        <option>Adjacent inspiration</option>
        <option>Mostly citation material</option>
        <option>Skimmable</option>
        <option>Ignore</option>
      </select>
    </section>

    <main>
      <section class="view view-detail" id="view-detail">
        <article class="panel detail-panel">
          <div class="detail-header">
            <div>
              <p class="detail-kicker" id="detailKicker"></p>
              <h2 id="detailTitle"></h2>
              <p class="detail-meta" id="detailMeta"></p>
            </div>
            <div class="detail-actions">
              <button class="button ghost" id="detailBackButton" type="button">← back</button>
              <button class="button ghost hidden" id="detailAudioButton" type="button">▶ play audio</button>
              <a class="button ghost" id="detailSourceLink" target="_blank" rel="noreferrer">open on GitHub</a>
            </div>
          </div>
          <audio id="detailAudioPlayer" class="detail-audio hidden" controls preload="none"></audio>
          <article class="markdown-body" id="detailBody"></article>
        </article>
      </section>

      <section class="view active" id="view-overview">
        <div class="stats" id="stats"></div>
        <div class="grid two">
          <article class="panel">
            <div class="panel-head">
              <h2>Latest digest</h2>
              <span id="latestDigestDate" class="muted"></span>
            </div>
            <div id="latestDigest"></div>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h2>Recent top notes</h2>
            </div>
            <div id="recentPicks" class="stack"></div>
          </article>
        </div>
      </section>

      <section class="view" id="view-digests">
        <div id="digestList" class="card-list"></div>
      </section>

      <section class="view" id="view-notes">
        <div id="notesList" class="card-list"></div>
      </section>

      <section class="view" id="view-related">
        <div id="relatedList" class="card-list"></div>
      </section>
    </main>
  </div>

  <template id="digestCardTemplate">
    <article class="card digest-card">
      <div class="card-meta-row">
        <a class="chip date" target="_blank" rel="noreferrer"></a>
        <a class="chip link" target="_blank" rel="noreferrer">open markdown</a>
      </div>
      <h3></h3>
      <p class="theme"></p>
      <p class="overview"></p>
      <details>
        <summary>Takeaway</summary>
        <p class="takeaway"></p>
      </details>
    </article>
  </template>

  <template id="noteCardTemplate">
    <article class="card note-card">
      <div class="card-meta-row">
        <a class="chip verdict" target="_blank" rel="noreferrer"></a>
        <a class="chip venue" target="_blank" rel="noreferrer"></a>
      </div>
      <h3></h3>
      <p class="why"></p>
      <p class="overview"></p>
      <p class="why-matters"></p>
      <div class="link-row">
        <a class="paper-link" target="_blank" rel="noreferrer">paper</a>
        <button class="listen-link reset-button hidden" type="button">listen</button>
        <a class="md-link" target="_blank" rel="noreferrer">note markdown</a>
      </div>
    </article>
  </template>

  <template id="relatedCardTemplate">
    <article class="card related-card">
      <h3></h3>
      <p class="overview"></p>
      <a class="md-link" target="_blank" rel="noreferrer">open markdown</a>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
